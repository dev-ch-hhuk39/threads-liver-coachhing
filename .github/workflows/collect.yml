name: コンテンツ収集・生成（ライバー Threads）

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'  # JST 22:00 毎日チェック

concurrency:
  group: collect-liver
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.SA_JSON_BASE64 }}"
          echo "::add-mask::${{ secrets.GEMINI_API_KEY }}"
          echo "::add-mask::${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Restore service account JSON
        env:
          SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 }}
        run: |
          set -eu
          mkdir -p "$HOME/.config/gspread"
          echo "$SA_JSON_BASE64" | base64 -d > "${GITHUB_WORKSPACE}/sa.json"
          install -m 600 "${GITHUB_WORKSPACE}/sa.json" "$HOME/.config/gspread/service_account.json"
          rm -f "${GITHUB_WORKSPACE}/sa.json"

      - name: Gemini生成 → スプシ書き込み
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          SHEET_URL:            ${{ secrets.SHEET_URL }}
          SHEET_TAB:            ${{ secrets.SHEET_TAB }}
          DEDUP_TAB:            ${{ secrets.DEDUP_TAB }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python collect.py --platform threads

      - name: Discord通知（失敗時）
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"\\u274c 収集ワークフロー失敗\",\"description\":\"ライバーThreads: collect.yml でエラーが発生しました\",\"color\":16711680}]}"
          fi

      - name: Keepalive
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          date > last_collect.txt
          git add last_collect.txt
          git diff --staged --quiet && echo "変更なし、スキップ" && exit 0
          git commit -m "keepalive: collect $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin HEAD || echo "[WARN] keepalive push失敗（無視して続行）"
