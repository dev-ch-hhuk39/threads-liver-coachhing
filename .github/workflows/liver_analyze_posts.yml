name: Liver Analyze Posts

on:
  schedule:
    - cron: "30 0 * * *" # JST 09:30
  workflow_dispatch:

concurrency:
  group: liver-analyze-posts
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHEET_ID: ${{ secrets.SHEET_ID }}
      SHEET_URL: ${{ secrets.SHEET_URL }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 }}
      GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Analyze posts
        run: |
          python x_analyze_posts.py

      - name: Prepare media assets
        run: |
          python x_prepare_media_assets.py

      - name: Sync Threads queue
        run: |
          python x_sync_post_queue.py
