name: Liver Generate Review Rewrites (Gemini)

on:
  schedule:
    - cron: "45 0 * * *" # JST 09:45
  workflow_dispatch:

concurrency:
  group: liver-generate-review-rewrites
  cancel-in-progress: false

jobs:
  rewrite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHEET_ID: ${{ secrets.SHEET_ID }}
      SHEET_URL: ${{ secrets.SHEET_URL }}
      SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 }}
      GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_REWRITE_MODEL: gemini-2.5-flash
      GEMINI_REWRITE_MAX_ROWS: 3
      GEMINI_REWRITE_INTERVAL_SECONDS: 12

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Generate review rewrites
        run: |
          python x_generate_review_rewrites.py
