name: Threads daily posts

on:
  workflow_dispatch:
  schedule:
    - cron: '45 14 * * *'  # JST 00:00 ±15
    - cron: '45 17 * * *'  # JST 03:00 ±15
    - cron: '45 20 * * *'  # JST 06:00 ±15
    - cron: '45 23 * * *'  # JST 09:00 ±15
    - cron: '45 2 * * *'   # JST 12:00 ±15
    - cron: '45 5 * * *'   # JST 15:00 ±15
    - cron: '45 8 * * *'   # JST 18:00 ±15
    - cron: '45 11 * * *'  # JST 21:00 ±15

concurrency:
  group: threads-auto
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.THREADS_ACCESS_TOKEN }}"
          echo "::add-mask::${{ secrets.SA_JSON_BASE64 }}"
          echo "::add-mask::${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Restore service account JSON
        env:
          SA_JSON_BASE64: ${{ secrets.SA_JSON_BASE64 }}
        run: |
          set -eu
          mkdir -p "$HOME/.config/gspread"
          echo "$SA_JSON_BASE64" | base64 -d > "${GITHUB_WORKSPACE}/sa.json"
          install -m 600 "${GITHUB_WORKSPACE}/sa.json" "$HOME/.config/gspread/service_account.json"
          rm -f "${GITHUB_WORKSPACE}/sa.json"

      - name: Random delay within 30min (skip on manual runs)
        if: github.event_name == 'schedule'
        timeout-minutes: 40
        run: |
          MAX=$(( RANDOM % 1800 ))
          echo "Random wait: ${MAX}s"
          sleep "$MAX"

      - name: Post exactly one row
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          SHEET_URL: ${{ secrets.SHEET_URL }}
          SHEET_TAB: ${{ secrets.SHEET_TAB }}
        run: |
          python main_gsheet.py

      - name: Discord通知（失敗時）
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"\\u274c 投稿失敗\",\"description\":\"ライバーThreads: 投稿エラーが発生しました。ログを確認してください。\",\"color\":16711680}]}"
          fi

      - name: Keepalive
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          date > last_run.txt
          git add last_run.txt
          git commit -m "keepalive: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || exit 0
          git push
